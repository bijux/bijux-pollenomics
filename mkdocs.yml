INHERIT: mkdocs.shared.yml

site_name: Bijux Pollenomics
site_description: Nordic aDNA, pollen, environmental archaeology, and archaeology mapping documentation for data preparation, reporting, and spatial interpretation workflows.
site_url: !ENV [SITE_URL, https://bijux.io/bijux-pollenomics/]
site_author: Bijan Mousavi <bijan@bijux.io>
repo_name: bijux/bijux-pollenomics
repo_url: https://github.com/bijux/bijux-pollenomics
edit_uri: edit/main/docs/
docs_dir: docs
strict: true
site_dir: artifacts/root/docs/site
watch:
  - docs
  - docs/assets
  - docs/overrides
  - .bijux/shared/bijux-docs
  - mkdocs.yml
  - mkdocs.shared.yml
  - packages/bijux-pollenomics-dev/src/bijux_pollenomics_dev/docs

theme:
  custom_dir: docs/overrides

extra:
  bijux:
    repository: bijux-pollenomics
    docs_package: bijux-pollenomics-dev
    nav_mode: default
    theme_key: bijux:theme
    hub_links:
      - key: bijux
        label: Bijux
        url: https://bijux.io/
      - key: bijux-core
        label: Core
        url: https://bijux.io/bijux-core/
      - key: bijux-canon
        label: Canon
        url: https://bijux.io/bijux-canon/
      - key: bijux-atlas
        label: Atlas
        url: https://bijux.io/bijux-atlas/
      - key: bijux-proteomics
        label: Proteomics
        url: https://bijux.io/bijux-proteomics/
      - key: bijux-pollenomics
        label: Pollenomics
        url: https://bijux.io/bijux-pollenomics/
      - key: bijux-masterclass
        label: Masterclass
        url: https://bijux.io/bijux-masterclass/

not_in_nav: |
  assets/**
  report/**/*.csv
  report/**/*.geojson
  report/**/*.html
  report/**/*.json
  report/**/*.md

nav:
