INHERIT: mkdocs.shared.yml

site_name: Bijux Pollenomics
site_description: Nordic aDNA, pollen, environmental archaeology, and archaeology mapping documentation for data preparation, reporting, and spatial interpretation workflows.
site_url: !ENV [SITE_URL, https://bijux.io/pollenomics/]
site_author: Bijan Mousavi <bijan@bijux.io>
repo_name: bijux/bijux-pollenomics
repo_url: https://github.com/bijux/bijux-pollenomics
edit_uri: edit/main/docs/
docs_dir: docs
site_dir: artifacts/root/docs/site
strict: true

theme:
  custom_dir: docs/overrides
  favicon: assets/site-icons/favicon.ico

hooks:
  - docs/hooks/publish_site_assets.py

extra_javascript:
  - assets/javascripts/vendor/mermaid-11.6.0.min.js
  - assets/javascripts/mermaid-init.js

not_in_nav: |
  assets/**
  report/**/*.csv
  report/**/*.geojson
  report/**/*.html
  report/**/*.json
  report/**/*.md

nav:
  - Home: index.md
  - Foundation:
      - Overview: foundation/index.md
      - Product Overview: foundation/product-overview.md
      - Repository Scope: foundation/repository-scope.md
      - Scope and Non-Goals: foundation/scope-and-non-goals.md
      - Map-First Product Model: foundation/map-first-product-model.md
  - Outputs:
      - Overview: outputs/index.md
      - Nordic Evidence Atlas: outputs/nordic-evidence-atlas.md
      - Country Reports: outputs/country-reports.md
      - Lyngsjön Lake Fieldwork: outputs/lyngsjon-lake-fieldwork.md
      - Artifact Lifecycle: outputs/artifact-lifecycle.md
      - Published Artifacts: outputs/published-artifacts.md
  - Workflows:
      - Overview: workflows/index.md
      - Install and Verify: workflows/install-and-verify.md
      - Rebuild Data Tree: workflows/rebuild-data-tree.md
      - Publish Report Artifacts: workflows/publish-report-artifacts.md
      - Troubleshoot Local Setup: workflows/troubleshoot-local-setup.md
  - Data Sources:
      - Overview: data-sources/index.md
      - Source Comparison: data-sources/source-comparison.md
      - Provenance and Refresh Policy: data-sources/provenance-and-refresh-policy.md
      - AADR: data-sources/aadr.md
      - Boundaries: data-sources/boundaries.md
      - LandClim: data-sources/landclim.md
      - Neotoma: data-sources/neotoma.md
      - SEAD: data-sources/sead.md
      - RAÄ: data-sources/raa.md
  - Architecture:
      - Overview: architecture/index.md
      - System Overview: architecture/system-overview.md
      - Data Collection Flow: architecture/data-collection-flow.md
      - Publication Flow: architecture/publication-flow.md
      - Codebase Layout and Ownership: architecture/codebase-layout-and-ownership.md
  - Engineering:
      - Overview: engineering/index.md
      - Local Workflow: engineering/local-workflow.md
      - Automation Workflows: engineering/automation-workflows.md
      - Testing and Evidence: engineering/testing-and-evidence.md
      - Change Review Checklist: engineering/change-review-checklist.md
      - Documentation Standards: engineering/documentation-standards.md
  - API Governance:
      - API and Schema Governance: bijux-pollenomics/api-and-schema-governance.md
      - API Contracts: bijux-pollenomics/apis.md
  - Reference:
      - Overview: reference/index.md
      - Command Reference: reference/command-reference.md
      - Configuration Defaults: reference/configuration-defaults.md
      - Data Layout: reference/data-layout.md
      - Report Layout: reference/report-layout.md
      - Glossary: reference/glossary.md
