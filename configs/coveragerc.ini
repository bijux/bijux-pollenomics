[run]
branch = True
parallel = False
source =
    bijux_pollenomics
    bijux_pollenomics_dev
data_file = artifacts/test/.coverage
omit =
    */.tox/*
    */.venv/*
    */site-packages/*
    */__main__.py
    tests/*

[report]
show_missing = True
skip_covered = False
precision = 1

[html]
directory = artifacts/test/htmlcov
