strict: true
use_directory_urls: true
dev_addr: 127.0.0.1:8000

validation:
  omitted_files: ignore

exclude_docs: |
  badges.md
  internal/**

theme:
  name: material
  language: en
  logo: assets/bijux_logo_hq.png
  favicon: assets/site-icons/favicon.ico
  font: false
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.path
    - navigation.tracking
    - navigation.instant
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.annotate
    - content.code.copy
    - content.code.select
    - content.action.edit
    - content.action.view
  palette:
    - media: "(prefers-color-scheme)"
      primary: teal
      accent: cyan
      toggle:
        icon: material/theme-light-dark
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/moon-waning-crescent
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/white-balance-sunny
        name: Switch to system mode

plugins:
  - search
  - autorefs
  - redirects:
      redirect_maps:
        foundation/index.md: public/pollenomics/foundation/index.md
        foundation/product-overview.md: public/pollenomics/foundation/index.md
        foundation/repository-scope.md: public/pollenomics/foundation/repository-scope-and-limits.md
        foundation/scope-and-non-goals.md: public/pollenomics/foundation/repository-scope-and-limits.md
        foundation/map-first-product-model.md: public/pollenomics/foundation/index.md
        architecture/index.md: public/pollenomics/architecture/index.md
        architecture/system-overview.md: public/pollenomics/architecture/module-map.md
        architecture/data-collection-flow.md: public/pollenomics/architecture/index.md
        architecture/publication-flow.md: public/pollenomics/architecture/index.md
        architecture/codebase-layout-and-ownership.md: public/pollenomics/architecture/module-map.md
        engineering/index.md: public/pollenomics/quality/index.md
        engineering/local-workflow.md: public/pollenomics/operations/index.md
        engineering/automation-workflows.md: public/pollenomics/operations/index.md
        engineering/testing-and-evidence.md: public/pollenomics/quality/test-strategy.md
        engineering/change-review-checklist.md: public/pollenomics/quality/index.md
        engineering/documentation-standards.md: public/pollenomics/quality/index.md
        workflows/index.md: public/pollenomics/operations/index.md
        workflows/install-and-verify.md: public/pollenomics/operations/installation-and-setup.md
        workflows/rebuild-data-tree.md: public/pollenomics/operations/index.md
        workflows/publish-report-artifacts.md: public/pollenomics/operations/index.md
        workflows/troubleshoot-local-setup.md: public/pollenomics/operations/index.md
        data-sources/index.md: public/pollenomics-data/sources/index.md
        data-sources/source-comparison.md: public/pollenomics-data/sources/source-comparison.md
        data-sources/provenance-and-refresh-policy.md: public/pollenomics-data/evidence/index.md
        data-sources/aadr.md: public/pollenomics-data/sources/aadr.md
        data-sources/boundaries.md: public/pollenomics-data/sources/boundaries.md
        data-sources/landclim.md: public/pollenomics-data/sources/landclim.md
        data-sources/neotoma.md: public/pollenomics-data/sources/neotoma.md
        data-sources/raa.md: public/pollenomics-data/sources/raa.md
        data-sources/sead.md: public/pollenomics-data/sources/sead.md
        outputs/index.md: public/pollenomics-data/outputs/index.md
        outputs/nordic-evidence-atlas.md: public/pollenomics-data/outputs/geographic-evidence-surfaces.md
        outputs/country-reports.md: public/pollenomics-data/outputs/published-reports.md
        outputs/artifact-lifecycle.md: public/pollenomics-data/outputs/index.md
        outputs/published-artifacts.md: public/pollenomics-data/outputs/published-reports.md
        outputs/lyngsjon-lake-fieldwork.md: public/fieldwork/lyngsjon-lake-fieldwork/index.md
        02-bijux-pollenomics-data/fieldwork/index.md: public/fieldwork/index.md
        02-bijux-pollenomics-data/fieldwork/lyngsjon-lake-fieldwork.md: public/fieldwork/lyngsjon-lake-fieldwork/index.md
        reference/index.md: public/pollenomics/interfaces/index.md
        reference/command-reference.md: public/pollenomics/interfaces/cli-surface.md
        reference/configuration-defaults.md: public/pollenomics/interfaces/index.md
        reference/data-layout.md: public/pollenomics-data/overview/data-directory-layout.md
        reference/report-layout.md: public/pollenomics-data/outputs/published-reports.md
        reference/glossary.md: public/pollenomics/foundation/index.md
        bijux-pollenomics/api-and-schema-governance.md: public/pollenomics/interfaces/index.md
        bijux-pollenomics/apis.md: public/pollenomics/interfaces/index.md
  - git-revision-date-localized:
      enable_creation_date: false
      fallback_to_build_date: true

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra:
  homepage: https://bijux.io/
  bijux:
    repository: bijux-pollenomics
    docs_package: bijux-pollenomics-dev
    nav_mode: default
    theme_key: bijux:theme
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/bijux

extra_css:
  - assets/styles/extra.css

extra_javascript:
  - assets/javascripts/vendor/mermaid-11.6.0.min.js
  - assets/javascripts/mermaid-init.js
  - assets/javascripts/shell/theme-persistence.js
  - assets/javascripts/shell/viewport-profile.js
  - assets/javascripts/shell/nav-state.js
  - assets/javascripts/shell/detail-tabs.js
  - assets/javascripts/shell/nav-reveal.js
  - assets/javascripts/shell/bootstrap.js
  - assets/javascripts/navigation-sync.js
  - assets/javascripts/external-links.js

copyright: "© 2026 Bijan Mousavi <bijan@bijux.io>"
