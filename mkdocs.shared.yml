strict: true
use_directory_urls: true
dev_addr: 127.0.0.1:8000

validation:
  omitted_files: ignore

theme:
  name: material
  language: en
  logo: assets/bijux_logo_hq.png
  favicon: assets/site-icons/favicon.ico
  font: false
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.path
    - navigation.tracking
    - navigation.instant
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.annotate
    - content.code.copy
    - content.code.select
    - content.action.edit
    - content.action.view
  palette:
    - media: "(prefers-color-scheme)"
      primary: teal
      accent: cyan
      toggle:
        icon: material/theme-light-dark
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/moon-waning-crescent
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/white-balance-sunny
        name: Switch to system mode

plugins:
  - search
  - autorefs
  - redirects:
      redirect_maps:
        foundation/index.md: bijux-pollenomics/foundation/index.md
        foundation/product-overview.md: bijux-pollenomics/foundation/package-overview.md
        foundation/repository-scope.md: bijux-pollenomics/foundation/repository-fit.md
        foundation/scope-and-non-goals.md: bijux-pollenomics/foundation/scope-and-non-goals.md
        foundation/map-first-product-model.md: bijux-pollenomics/foundation/capability-map.md
        architecture/index.md: bijux-pollenomics/architecture/index.md
        architecture/system-overview.md: bijux-pollenomics/architecture/module-map.md
        architecture/data-collection-flow.md: bijux-pollenomics/architecture/execution-model.md
        architecture/publication-flow.md: bijux-pollenomics/architecture/integration-seams.md
        architecture/codebase-layout-and-ownership.md: bijux-pollenomics/architecture/code-navigation.md
        engineering/index.md: bijux-pollenomics/quality/index.md
        engineering/local-workflow.md: bijux-pollenomics/operations/local-development.md
        engineering/automation-workflows.md: bijux-pollenomics/operations/common-workflows.md
        engineering/testing-and-evidence.md: bijux-pollenomics/quality/test-strategy.md
        engineering/change-review-checklist.md: bijux-pollenomics/quality/review-checklist.md
        engineering/documentation-standards.md: bijux-pollenomics/quality/documentation-standards.md
        workflows/index.md: bijux-pollenomics/operations/index.md
        workflows/install-and-verify.md: bijux-pollenomics/operations/installation-and-setup.md
        workflows/rebuild-data-tree.md: bijux-pollenomics/operations/common-workflows.md
        workflows/publish-report-artifacts.md: bijux-pollenomics/operations/common-workflows.md
        workflows/troubleshoot-local-setup.md: bijux-pollenomics/operations/failure-recovery.md
        data-sources/index.md: bijux-pollenomics-data/sources/index.md
        data-sources/source-comparison.md: bijux-pollenomics-data/sources/source-comparison.md
        data-sources/provenance-and-refresh-policy.md: bijux-pollenomics-data/foundation/provenance-model.md
        data-sources/aadr.md: bijux-pollenomics-data/sources/aadr.md
        data-sources/boundaries.md: bijux-pollenomics-data/sources/boundaries.md
        data-sources/landclim.md: bijux-pollenomics-data/sources/landclim.md
        data-sources/neotoma.md: bijux-pollenomics-data/sources/neotoma.md
        data-sources/raa.md: bijux-pollenomics-data/sources/raa.md
        data-sources/sead.md: bijux-pollenomics-data/sources/sead.md
        outputs/index.md: bijux-pollenomics-data/outputs/index.md
        outputs/nordic-evidence-atlas.md: bijux-pollenomics-data/outputs/nordic-atlas.md
        outputs/country-reports.md: bijux-pollenomics-data/outputs/published-reports.md
        outputs/artifact-lifecycle.md: bijux-pollenomics-data/outputs/collection-summary.md
        outputs/published-artifacts.md: bijux-pollenomics-data/outputs/published-reports.md
        outputs/lyngsjon-lake-fieldwork.md: bijux-pollenomics-data/fieldwork/lyngsjon-lake-fieldwork.md
        reference/index.md: bijux-pollenomics/interfaces/index.md
        reference/command-reference.md: bijux-pollenomics/interfaces/entrypoints-and-examples.md
        reference/configuration-defaults.md: bijux-pollenomics/interfaces/configuration-surface.md
        reference/data-layout.md: bijux-pollenomics-data/foundation/directory-layout.md
        reference/report-layout.md: bijux-pollenomics-data/outputs/published-reports.md
        reference/glossary.md: bijux-pollenomics/foundation/domain-language.md
        bijux-pollenomics/api-and-schema-governance.md: bijux-pollenomics/interfaces/api-surface.md
        bijux-pollenomics/apis.md: bijux-pollenomics/interfaces/api-surface.md
  - git-revision-date-localized:
      enable_creation_date: false
      fallback_to_build_date: true

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra:
  homepage: https://bijux.io/
  bijux:
    repository: bijux-pollenomics
    docs_package: bijux-pollenomics-dev
    nav_mode: default
    theme_key: bijux:theme
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/bijux

extra_css:
  - assets/styles/extra.css

extra_javascript:
  - assets/javascripts/vendor/mermaid-11.6.0.min.js
  - assets/javascripts/mermaid-init.js
  - assets/javascripts/shell/theme-persistence.js
  - assets/javascripts/shell/viewport-profile.js
  - assets/javascripts/shell/nav-state.js
  - assets/javascripts/shell/detail-tabs.js
  - assets/javascripts/shell/nav-reveal.js
  - assets/javascripts/shell/bootstrap.js
  - assets/javascripts/navigation-sync.js
  - assets/javascripts/external-links.js

copyright: "© 2026 Bijan Mousavi <bijan@bijux.io>"
