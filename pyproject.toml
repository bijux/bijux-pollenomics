[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "bijux-pollen"
version = "0.1.0"
description = "Country-level reporting tools for AADR-backed pollenomic site selection work."
readme = "README.md"
requires-python = ">=3.11"
dependencies = []

[project.optional-dependencies]
dev = [
    "build>=1.2.2",
    "ruff>=0.13.0",
]

[project.scripts]
bijux-pollen-aadr = "bijux_pollen.cli:main"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
