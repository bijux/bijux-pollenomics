name: ci
on:
  workflow_call:
    inputs:
      package_slug:
        required: true
        type: string
      package_dir:
        required: true
        type: string
      artifacts_dir:
        required: true
        type: string
      test_python_versions:
        required: false
        type: string
        default: "[\"3.11\"]"
      check_targets:
        required: false
        type: string
        default: "[\"quality\", \"security\", \"docs\", \"api\", \"build\", \"sbom\"]"
      api_toolchain_targets:
        required: false
        type: string
        default: "[\"api\"]"
      post_test_command:
        required: false
        type: string
        default: ""
permissions:
  contents: read
concurrency:
  group: "ci-${{ inputs.package_slug }}-${{ github.ref }}"
  cancel-in-progress: true
jobs:
  tests:
    name: "tests-${{ inputs.package_slug }}-py${{ matrix.python-version }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: "${{ fromJson(inputs.test_python_versions) }}"
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
      - uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548
        with:
          python-version: "${{ matrix.python-version }}"
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: "Install package toolchain"
        shell: bash
        run: "set -euo pipefail
makefile=\"${GITHUB_WORKSPACE}/makes/packages/$(basename '${{ inputs.package_dir }}').mk\"
make -f \"$makefile\" -C \"${{ inputs.package_dir }}\" install
"
      - name: "Run tests"
        shell: bash
        run: "set -euo pipefail
makefile=\"${GITHUB_WORKSPACE}/makes/packages/$(basename '${{ inputs.package_dir }}').mk\"
make -f \"$makefile\" -C \"${{ inputs.package_dir }}\" test
"
      - name: "Run post-test validation"
        if: "${{ inputs.post_test_command != '' }}"
        shell: bash
        run: "${{ inputs.post_test_command }}"
      - name: "Upload test artifacts"
        if: "${{ always() }}"
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: "${{ inputs.package_slug }}-test-py${{ matrix.python-version }}"
          path: "${{ inputs.artifacts_dir }}/test"
          if-no-files-found: ignore
          retention-days: 14
  checks:
    name: "checks-${{ inputs.package_slug }}-${{ matrix.target }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: "${{ fromJson(inputs.check_targets) }}"
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
      - uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548
        with:
          python-version: 3.11
