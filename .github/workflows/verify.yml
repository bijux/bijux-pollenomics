# SSOT NOTICE: This file is generated by bijux-std standards sync.
# Source of truth: bijux-std/.github/standards/repo-config.manifest.json and bijux-std/shared/bijux-gh/workflows/.
# Do not edit this generated copy directly.

name: "repo / verify"
on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/**"
      - "apis/**"
      - "configs/**"
      - "docs/**"
      - "makes/**"
      - "packages/**"
      - Makefile
      - mkdocs.shared.yml
      - mkdocs.yml
      - pyproject.toml
      - tox.ini
      - uv.lock
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/**"
      - "apis/**"
      - "configs/**"
      - "docs/**"
      - "makes/**"
      - "packages/**"
      - Makefile
      - mkdocs.shared.yml
      - mkdocs.yml
      - pyproject.toml
      - tox.ini
      - uv.lock
  workflow_dispatch:
  merge_group:
    branches:
      - main
permissions:
  contents: read
  actions: read
  pull-requests: read
concurrency:
  group: "verify-${{ github.ref }}"
  cancel-in-progress: true
jobs:
  policy_gate:
    name: policy-prerequisites
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
      - name: "Wait for policy and standards prerequisites"
        shell: bash
        env:
          GITHUB_TOKEN: "${{ github.token }}"
        run:
          |
            set -euo pipefail
            python3 .github/scripts/check_workflow_prerequisites.py
  repository:
    name: repository-contracts
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
      - uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548
        with:
          python-version: 3.11
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: "Run repository checks"
        shell: bash
        run: "set -euo pipefail make check-shared-bijux-py check-config-layout check-make-layout help "
      - name: "Confirm clean worktree after checks"
        shell: bash
        run: "set -euo pipefail; if [[ -n \"$(git status --short)\" ]]; then git status --short; exit 1; fi "
    needs: policy_gate
  package:
    name: "${{ matrix.package_slug }}"
    needs:
      - policy_gate
      - repository
    strategy:
      fail-fast: false
      matrix:
        include:
          - package_slug: bijux-pollenomics
            package_dir: packages/bijux-pollenomics
            artifacts_dir: artifacts/bijux-pollenomics
            check_targets: "[\"quality\", \"security\", \"api\", \"openapi-drift\", \"build\", \"sbom\"]"
          - package_slug: pollenomics
            package_dir: packages/pollenomics
            artifacts_dir: artifacts/pollenomics
            check_targets: "[\"quality\", \"security\", \"build\", \"sbom\"]"
          - package_slug: bijux-pollenomics-dev
            package_dir: packages/bijux-pollenomics-dev
            artifacts_dir: artifacts/bijux-pollenomics-dev
            check_targets: "[\"quality\", \"security\", \"build\", \"sbom\"]"
    uses: ./.github/workflows/ci.yml
    with:
      package_slug: "${{ matrix.package_slug }}"
      package_dir: "${{ matrix.package_dir }}"
      artifacts_dir: "${{ matrix.artifacts_dir }}"
      test_python_versions: "${{ matrix.test_python_versions || '[\"3.11\"]' }}"
      check_targets: "${{ matrix.check_targets || '[\"quality\", \"security\", \"docs\", \"api\", \"build\", \"sbom\"]' }}"
      api_toolchain_targets: "${{ matrix.api_toolchain_targets || '[\"api\", \"openapi-drift\"]' }}"
      post_test_command: "${{ matrix.post_test_command || '' }}"
