name: verify

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/**"
      - "configs/**"
      - "docs/**"
      - "makes/**"
      - "packages/**"
      - "Makefile"
      - "mkdocs.yml"
      - "pyproject.toml"
      - "uv.lock"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/**"
      - "configs/**"
      - "docs/**"
      - "makes/**"
      - "packages/**"
      - "Makefile"
      - "mkdocs.yml"
      - "pyproject.toml"
      - "uv.lock"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repository:
    name: repository-contracts
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Run repository checks
        run: |
          make check-shared-bijux-py check-config-layout check-make-layout
          make check PYTHON=python3.11

      - name: Confirm clean worktree after checks
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "$(git status --short)" ]]; then
            git status --short
            exit 1
          fi

  package:
    name: ${{ matrix.package_slug }}
    needs: repository
    strategy:
      fail-fast: false
      matrix:
        include:
          - package_slug: bijux-pollenomics
            package_dir: packages/bijux-pollenomics
            artifacts_dir: artifacts/bijux-pollenomics
          - package_slug: bijux-pollenomics-dev
            package_dir: packages/bijux-pollenomics-dev
            artifacts_dir: artifacts/bijux-pollenomics-dev
            check_targets: '["quality", "security", "build", "sbom"]'
    uses: ./.github/workflows/ci-package.yml
    with:
      package_slug: ${{ matrix.package_slug }}
      package_dir: ${{ matrix.package_dir }}
      artifacts_dir: ${{ matrix.artifacts_dir }}
      test_python_versions: ${{ matrix.test_python_versions || '["3.11"]' }}
      check_targets: ${{ matrix.check_targets || '["quality", "security", "docs", "api", "build", "sbom"]' }}
      api_toolchain_targets: ${{ matrix.api_toolchain_targets || '["api"]' }}
      post_test_command: ${{ matrix.post_test_command || '' }}
