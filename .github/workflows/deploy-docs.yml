name: deploy-docs

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/deploy-docs.yml"
      - "configs/**"
      - "docs/**"
      - "makes/**"
      - "packages/**"
      - "Makefile"
      - "mkdocs.yml"
      - "pyproject.toml"
      - "uv.lock"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-docs-${{ github.ref }}
  cancel-in-progress: true

env:
  DOCS_PUBLISH_REPOSITORY: bijux/pollenomics
  DOCS_SITE_URL: https://bijux.io/bijux-pollenomics/
  DOCS_SITE_DIR: artifacts/root/docs/build-site

jobs:
  build-and-publish:
    name: build-and-publish-docs
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Setup uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Validate docs output contract
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import pathlib
          import re

          text = pathlib.Path("mkdocs.yml").read_text()
          site_dir_match = re.search(r"(?m)^site_dir:\s*(\S+)\s*$", text)
          site_dir = site_dir_match.group(1) if site_dir_match else "site"
          if site_dir != "artifacts/root/docs/site":
              raise SystemExit(f"mkdocs site_dir must be artifacts/root/docs/site, got: {site_dir}")
          strict_match = re.search(r"(?m)^strict:\s*(\S+)\s*$", text)
          strict_value = strict_match.group(1).lower() if strict_match else "false"
          if strict_value != "true":
              raise SystemExit(f"mkdocs strict must be true, got: {strict_value}")
          if "custom_dir: docs/overrides" not in text:
              raise SystemExit("mkdocs theme.custom_dir must point at docs/overrides")
          if "hooks:" not in text or "docs/hooks/publish_site_assets.py" not in text:
              raise SystemExit("mkdocs must publish site assets through docs/hooks/publish_site_assets.py")
          PY

      - name: Build docs site
        env:
          SITE_URL: ${{ env.DOCS_SITE_URL }}
        run: make docs PYTHON=python3.11

      - name: Validate published site root assets
        shell: bash
        run: |
          set -euo pipefail
          test -f "${DOCS_SITE_DIR}/favicon.ico"
          test -f "${DOCS_SITE_DIR}/apple-touch-icon.png"
          test -f "${DOCS_SITE_DIR}/apple-touch-icon-precomposed.png"

      - name: Publish built site to docs repository
        if: ${{ github.ref == 'refs/heads/main' }}
        env:
          DOCS_PUBLISH_TOKEN: ${{ secrets.POLLENOMICS_PUBLISH_TOKEN || secrets.BIJUX_PUBLISH_TOKEN || secrets.DOCS_PUBLISH_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${DOCS_PUBLISH_TOKEN:-}" ]]; then
            echo "Docs site build succeeded, but publication was skipped because no publish token is configured."
            echo "Set POLLENOMICS_PUBLISH_TOKEN (preferred), BIJUX_PUBLISH_TOKEN, or DOCS_PUBLISH_TOKEN to enable deployment to ${DOCS_PUBLISH_REPOSITORY}."
            exit 0
          fi

          publish_root="$(mktemp -d)"
          git clone "https://x-access-token:${DOCS_PUBLISH_TOKEN}@github.com/${DOCS_PUBLISH_REPOSITORY}.git" "$publish_root"

          find "$publish_root" -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          cp -R "${DOCS_SITE_DIR}"/. "$publish_root"/
          rm -f "$publish_root/CNAME"
          touch "$publish_root/.nojekyll"

          git -C "$publish_root" config user.name "github-actions[bot]"
          git -C "$publish_root" config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [[ -z "$(git -C "$publish_root" status --short)" ]]; then
            echo "No docs changes to publish."
            exit 0
          fi

          git -C "$publish_root" add --all
          git -C "$publish_root" commit -m "docs: publish site from ${GITHUB_REPOSITORY}@${GITHUB_SHA::7}"
          git -C "$publish_root" push origin HEAD:main
