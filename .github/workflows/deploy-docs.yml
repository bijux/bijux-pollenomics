name: Deploy Docs

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: deploy-docs-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build docs site
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548 # v6.1.0
        with:
          python-version: "3.11"

      - name: Setup uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Configure Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b

      - name: Validate docs output contract
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import pathlib
          import re

          text = pathlib.Path("mkdocs.yml").read_text()
          site_dir_match = re.search(r"(?m)^site_dir:\s*(\S+)\s*$", text)
          site_dir = site_dir_match.group(1) if site_dir_match else "site"
          if site_dir != "artifacts/docs/site":
              raise SystemExit(f"mkdocs site_dir must be artifacts/docs/site, got: {site_dir}")
          strict_match = re.search(r"(?m)^strict:\s*(\S+)\s*$", text)
          strict_value = strict_match.group(1).lower() if strict_match else "false"
          if strict_value != "true":
              raise SystemExit(f"mkdocs strict must be true, got: {strict_value}")
          if "custom_dir: docs/overrides" not in text:
              raise SystemExit("mkdocs theme.custom_dir must point at docs/overrides")
          if "hooks:" not in text or "docs/hooks/publish_site_assets.py" not in text:
              raise SystemExit("mkdocs must publish site assets through docs/hooks/publish_site_assets.py")
          PY

      - name: Build docs site
        run: make docs PYTHON=python

      - name: Validate published site root assets
        shell: bash
        run: |
          set -euo pipefail
          test -f artifacts/docs/site/favicon.ico
          test -f artifacts/docs/site/apple-touch-icon.png
          test -f artifacts/docs/site/apple-touch-icon-precomposed.png

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b
        with:
          path: artifacts/docs/site

  deploy:
    name: Deploy docs site
    needs: build
    if: ${{ github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e
