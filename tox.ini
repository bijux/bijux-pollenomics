[tox]
minversion = 4.11
requires =
    tox>=4.11
    tox-gh-actions>=3.1
isolated_build = true
skip_missing_interpreters = true
envlist =
    security
    test-{dev,core,alias}
    lint-{dev,core,alias}
    quality-{dev,core,alias}
    security-{dev,core,alias}
    build-{dev,core,alias}
    sbom-{dev,core,alias}
    api-core
    docs

[gh-actions]
python =
    3.11: security, docs, test-dev, test-core, test-alias, lint-dev, lint-core, lint-alias, quality-dev, quality-core, quality-alias, security-dev, security-core, security-alias, build-dev, build-core, build-alias, sbom-dev, sbom-core, sbom-alias, api-core

[testenv]
package = skip
basepython = python3.11
skip_install = true
allowlist_externals = make
change_dir = {env:PACKAGE_DIR}
setenv =
    MONOREPO_ROOT = {tox_root}
    MAKEFLAGS = VENV={envdir} ACT={envdir}/bin
    PIP_DISABLE_PIP_VERSION_CHECK = 1
    PYTHONDONTWRITEBYTECODE = 1
    INSTALL_EXTRAS = dev

    dev: PACKAGE_MAKEFILE = {tox_root}/makes/packages/bijux-pollenomics-dev.mk
    core: PACKAGE_MAKEFILE = {tox_root}/makes/packages/bijux-pollenomics.mk
    alias: PACKAGE_MAKEFILE = {tox_root}/makes/packages/pollenomics.mk

    dev: PACKAGE_DIR = {tox_root}/packages/bijux-pollenomics-dev
    core: PACKAGE_DIR = {tox_root}/packages/bijux-pollenomics
    alias: PACKAGE_DIR = {tox_root}/packages/pollenomics

    core: API_DIR = {tox_root}/apis/bijux-pollenomics
passenv =
    CI
    GITHUB_*
    GITLAB_*
    PIP_INDEX_URL
    PIP_EXTRA_INDEX_URL
    HTTP_PROXY
    HTTPS_PROXY
    NO_PROXY
    SSH_AUTH_SOCK
    LC_ALL
    LANG
    TC_BASE
    SBOM_CLI
    OPENAPI_GENERATOR_VERSION
    API_HOST
    API_PORT
    API_BASE_PATH
    API_FACTORY
commands_pre =
    python -m pip install -U "pip>=25.3,<26"
    make -f {env:PACKAGE_MAKEFILE} install EXTRAS={env:INSTALL_EXTRAS} PACKAGE_INSTALL_SPEC=.[{env:INSTALL_EXTRAS}]
    security: python -m pip install -U "pip>=25.3,<26"
commands =
    test: make -f {env:PACKAGE_MAKEFILE} test
    lint: make -f {env:PACKAGE_MAKEFILE} lint
    quality: make -f {env:PACKAGE_MAKEFILE} quality
    security: make -f {env:PACKAGE_MAKEFILE} security
    build: make -f {env:PACKAGE_MAKEFILE} build
    sbom: make -f {env:PACKAGE_MAKEFILE} sbom
    api: make -f {env:PACKAGE_MAKEFILE} api

[testenv:security]
package = skip
basepython = python3.11
allowlist_externals = make
change_dir = {tox_root}
commands_pre =
    python -m pip install -U "pip>=25.3,<26"
commands =
    make security

[testenv:docs]
package = skip
basepython = python3.11
allowlist_externals = make
change_dir = {tox_root}
commands_pre =
    python -m pip install -U "pip>=25.3,<26"
commands =
    make docs
