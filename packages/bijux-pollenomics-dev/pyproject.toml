[build-system]
requires = ["hatchling>=1.27.0,<1.28"]
build-backend = "hatchling.build"

[project]
name = "bijux-pollenomics-dev"
version = "0.1.0"
description = "Repository-owned developer tooling for bijux-pollenomics."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
authors = [
    { name = "Bijan Mousavi", email = "bijan@bijux.io" },
]
dependencies = []

[project.urls]
Documentation = "https://bijux.io/bijux-pollenomics/"
Repository = "https://github.com/bijux/bijux-pollenomics"
Issues = "https://github.com/bijux/bijux-pollenomics/issues"

[project.optional-dependencies]
dev = [
    "pytest>=8.4.1,<9.0",
    "pytest-asyncio>=1.0.0,<2.0",
    "pytest-cov>=6.2.1,<7.0",
    "pytest-timeout>=2.4.0,<3.0",
    "hatch>=1.14.0,<2.0",
    "pydantic>=2.12,<3.0",
    "ruff>=0.13.0,<1.0",
    "mypy>=1.18.2,<2.0",
    "vulture>=2.14,<3.0",
    "deptry>=0.24.0,<1.0",
    "interrogate>=1.7.0,<2.0",
    "bandit>=1.8.6,<2.0",
    "pip-audit>=2.9.0,<3.0",
    "build>=1.3.0,<2.0",
    "codespell>=2.4.1,<3.0",
    "radon>=6.0.1,<7.0",
    "twine>=6.2.0,<7.0",
]

[tool.hatch.build]
include = [
    "README.md",
    "src/bijux_pollenomics_dev/**",
]
force-include = { "../../LICENSE" = "LICENSE", "../../NOTICE" = "NOTICE" }

[tool.hatch.build.targets.wheel]
packages = ["src/bijux_pollenomics_dev"]
