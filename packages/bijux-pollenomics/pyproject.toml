[build-system]
requires = ["hatchling>=1.27.0,<1.30", "hatch-vcs>=0.4.0,<1.0"]
build-backend = "hatchling.build"

[project]
name = "bijux-pollenomics"
description = "Data collection, reporting, and mapping tools for Nordic aDNA and contextual evidence layers."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
authors = [
    { name = "Bijan Mousavi", email = "bijan@bijux.io" },
]
keywords = ["aadr", "archaeology", "atlas", "paleoecology", "pollenomics"]
dynamic = ["version"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Science/Research",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3 :: Only",
    "Programming Language :: Python :: 3.11",
    "Topic :: Scientific/Engineering :: Information Analysis",
]
dependencies = [
    "defusedxml>=0.7.1",
]

[project.urls]
Documentation = "https://bijux.io/bijux-pollenomics/01-bijux-pollenomics/"
Repository = "https://github.com/bijux/bijux-pollenomics"
Issues = "https://github.com/bijux/bijux-pollenomics/issues"
Changelog = "https://github.com/bijux/bijux-pollenomics/blob/main/packages/bijux-pollenomics/CHANGELOG.md"
Security = "https://github.com/bijux/bijux-pollenomics/blob/main/SECURITY.md"

[project.optional-dependencies]
dev = [
    "build>=1.2.2",
    "mkdocs>=1.6.1",
    "mkdocs-autorefs>=1.4.2",
    "mkdocs-git-revision-date-localized-plugin>=1.4.7",
    "mkdocs-material>=9.6.12",
    "pymdown-extensions>=10.15",
    "ruff>=0.13.0",
    "twine>=6.1.0",
    "bandit>=1.7.10",
    "pip-audit>=2.7.3",
]

[project.scripts]
bijux-pollenomics = "bijux_pollenomics.cli:main"

[tool.hatch.version]
source = "vcs"
tag-pattern = "^v(?P<version>.*)$"
fallback-version = "0.1.5"
raw-options = { git_describe_command = "git describe --dirty --tags --long --match 'v*'", local_scheme = "dirty-tag", version_scheme = "guess-next-dev", root = "../..", search_parent_directories = true }

[tool.hatch.build]
include = [
    "README.md",
    "CHANGELOG.md",
    "LICENSE",
    "NOTICE",
    "src/bijux_pollenomics/**",
]
force-include = { "LICENSE" = "LICENSE", "NOTICE" = "NOTICE" }

[tool.hatch.build.targets.wheel]
packages = ["src/bijux_pollenomics"]

[tool.interrogate]
fail-under = 69
verbose = 0
ignore-init-method = true
ignore-private = true
ignore-semiprivate = true
